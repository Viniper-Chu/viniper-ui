name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-update-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build update package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^##\s+{re.escape(version)}[^\n]*\n(?P<body>.*?)(?=^##\s+v|\Z)"
          match = re.search(pattern, text, flags=re.M | re.S)
          notes = match.group("body").strip() if match else f"Viniper UI {version}"
          Path("dist").mkdir(exist_ok=True)
          Path("dist/release-notes.md").write_text(notes + "\n", encoding="utf-8")
          PY
          NOTES="$(cat dist/release-notes.md)"
          python scripts/build_release.py --version "$VERSION" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          python scripts/verify_release.py

      - name: Upload update package
        uses: actions/upload-artifact@v4
        with:
          name: update-package
          path: |
            dist/ViniperUI-v*.zip
            dist/ViniperUI-v*.zip.sha256
            dist/latest.json
            dist/release-notes.md

  build-windows-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build Windows desktop installer
        shell: pwsh
        run: python scripts/build_desktop.py --target win

      - name: Upload Windows desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap

  build-macos-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build macOS desktop package
        run: python scripts/build_desktop.py --target mac

      - name: Upload macOS desktop package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            desktop/release/*.zip
            desktop/release/*.blockmap

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-update-package
      - build-windows-desktop
      - build-macos-desktop
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          name: Viniper UI ${{ github.ref_name }}
          body_path: release-artifacts/release-notes.md
          make_latest: true
          overwrite_files: true
