name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-update-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build update package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^##\s+{re.escape(version)}[^\n]*\n(?P<body>.*?)(?=^##\s+v|\Z)"
          match = re.search(pattern, text, flags=re.M | re.S)
          notes = match.group("body").strip() if match else f"Viniper UI {version}"
          Path("dist").mkdir(exist_ok=True)
          Path("dist/release-notes.md").write_text(notes + "\n", encoding="utf-8")
          PY
          NOTES="$(cat dist/release-notes.md)"
          python scripts/build_release.py --version "$VERSION" --repo "$GITHUB_REPOSITORY" --notes "$NOTES"
          python scripts/verify_release.py

      - name: Upload update package
        uses: actions/upload-artifact@v4
        with:
          name: update-package
          path: |
            dist/ViniperUI-v*.zip
            dist/ViniperUI-v*.zip.sha256
            dist/latest.json
            dist/release-notes.md

  build-windows-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build Windows desktop installer
        shell: pwsh
        run: python scripts/build_desktop.py --target win

      - name: Upload Windows desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap

  build-macos-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Build macOS desktop package
        run: python scripts/build_desktop.py --target mac

      - name: Upload macOS desktop package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            desktop/release/*.zip
            desktop/release/*.blockmap

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-update-package
      - build-windows-desktop
      - build-macos-desktop
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Finalize update manifest
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("release-artifacts")
          manifest_path = root / "latest.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          repo = os.environ["GITHUB_REPOSITORY"]

          def sha256_file(path):
              h = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def asset(path):
              return {
                  "name": path.name,
                  "url": f"https://github.com/{repo}/releases/latest/download/{path.name}",
                  "sha256": sha256_file(path),
                  "size": path.stat().st_size,
              }

          assets = manifest.setdefault("assets", {})
          windows = sorted(root.glob("Viniper.UI.Setup.*.exe"))
          macos = sorted(root.glob("Viniper.UI.*-mac.zip"))
          if windows:
              assets["installer_windows"] = asset(windows[-1])
          if macos:
              assets["installer_macos"] = asset(macos[-1])
          manifest["published_at"] = datetime.now(timezone.utc).isoformat()
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          name: Viniper UI ${{ github.ref_name }}
          body_path: release-artifacts/release-notes.md
          make_latest: true
          overwrite_files: true

      - name: Keep only latest two releases
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 2;
            const semver = (tag) => {
              const match = /^v?(\d+)\.(\d+)\.(\d+)$/.exec(tag || "");
              return match ? match.slice(1).map(Number) : [0, 0, 0];
            };
            const compareDesc = (a, b) => {
              const av = semver(a.tag_name);
              const bv = semver(b.tag_name);
              for (let i = 0; i < 3; i += 1) {
                if (av[i] !== bv[i]) return bv[i] - av[i];
              }
              return new Date(b.created_at) - new Date(a.created_at);
            };
            const releases = (await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            })).filter((release) => /^v?\d+\.\d+\.\d+$/.test(release.tag_name));
            releases.sort(compareDesc);
            for (const release of releases.slice(keep)) {
              core.info(`Deleting old release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
              } catch (error) {
                core.warning(`Could not delete tag ${release.tag_name}: ${error.message}`);
              }
            }
            const tagRefs = await github.paginate(github.rest.git.listMatchingRefs, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "tags/v"
            });
            const semverTags = tagRefs
              .map((item) => item.ref.replace("refs/tags/", ""))
              .filter((tag) => /^v?\d+\.\d+\.\d+$/.test(tag))
              .sort((a, b) => {
                const av = semver(a);
                const bv = semver(b);
                for (let i = 0; i < 3; i += 1) {
                  if (av[i] !== bv[i]) return bv[i] - av[i];
                }
                return 0;
              });
            for (const tag of semverTags.slice(keep)) {
              core.info(`Deleting old tag ${tag}`);
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`
                });
              } catch (error) {
                core.warning(`Could not delete tag ${tag}: ${error.message}`);
              }
            }
